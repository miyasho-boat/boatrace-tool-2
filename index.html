<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボートレースツール Ver.2</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:sans-serif;
}
header{
    background:#0077cc;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}
main{
    max-width:900px;
    margin:auto;
    padding:20px;
}
.box{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}
input[type=file]{
    width:100%;
    font-size:18px;
    margin-bottom:15px;
}
button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}
#preview{
    margin-top:20px;
    text-align:center;
}
#preview img{
    max-width:100%;
    border:1px solid #ccc;
}
#result{
    margin-top:20px;
    background:#eee;
    padding:15px;
    min-height:120px;
    white-space:pre-wrap;
    font-size:20px;
}
</style>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body>

<header>
ボートレースツール Ver.2
</header>

<main>

<div class="box">

<input type="file" id="imageFile" accept="image/*">

<div id="preview"></div>

<button id="ocrButton" disabled>
選手名を読み取る
</button>

<button id="copyButton" disabled>
コピー
</button>

<div id="result">
ここにOCR結果が表示されます。
</div>

</div>

</main>

<script>

const file=document.getElementById("imageFile");
const preview=document.getElementById("preview");
const button=document.getElementById("ocrButton");
const copy=document.getElementById("copyButton");
const result=document.getElementById("result");

file.addEventListener("change",function(){

const img=new Image();

img.src=URL.createObjectURL(file.files[0]);

preview.innerHTML="";

preview.appendChild(img);

button.disabled=false;

});

button.addEventListener("click",async()=>{

result.innerText="OCR読み取り中です…";

const {
data:{text}
}=await Tesseract.recognize(
file.files[0],
"jpn"
);

const lines = text.split("\n");

const names = [];

for (let line of lines) {
  line = line.replace(/[0-9A-Za-z\/\[\]\(\)\.\,\:\-\|]/g, "");
  line = line.replace(/\s+/g, "");

  // 2～5文字の漢字だけを候補にする
  if (/^[一-龥]{2,5}$/.test(line)) {
    names.push(line);
  }
}

// 重複を削除
const uniqueNames = [...new Set(names)];

// 最初の6人だけ表示
result.innerText = uniqueNames.slice(0, 6).join("\n");

copy.disabled=false;

});

copy.addEventListener("click",()=>{

navigator.clipboard.writeText(result.innerText);

alert("コピーしました");

});

</script>

</body>
</html>
